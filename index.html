<!DOCTYPE html>
<html lang="en" data-theme="quantum-pulse">
  <head>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.1.0/",
        "react": "https://esm.sh/react@^19.1.0",
        "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
        "@google/genai": "https://esm.sh/@google/genai@^1.11.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.7.1",
        "three/": "https://esm.sh/three@^0.178.0/",
        "three": "https://esm.sh/three@^0.178.0"
      }
    }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Leher Music Distribution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oxanium:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --font-family-heading: 'Oxanium', sans-serif;
        --font-family-body: 'Inter', sans-serif;
        --border-radius-base: 0.5rem; 
        --border-radius-lg: 1rem; 
        --border-radius-full: 9999px;

        --singularity-purple-transparent: rgba(147, 51, 234, 0.2);
        --singularity-pink-transparent: rgba(219, 39, 119, 0.2);
        --singularity-teal-transparent: rgba(20, 184, 166, 0.2);
      }
      
      [data-theme='quantum-pulse'] {
        --color-primary: #1331FF;
        --color-secondary: #FE2D8B;
        --color-accent: #18D59C;
        --color-danger: #F94144;
        --color-warning: #F9C74F;
        --color-success: #90BE6D;

        --color-bg: #0A0A1A;
        --color-surface: #101223;
        --color-border: rgba(0, 224, 255, 0.2);
        --color-text-heading: #FFFFFF;
        --color-text-body: #D1D1E0;
        --color-text-subtle: #888EB8;

        --quantum-blue: #1331FF;
        --quantum-magenta: #FE2D8B;
        --quantum-green: #18D59C;
        --quantum-yellow: #FECA0D;
        --quantum-cyan: #00E0FF;

        --singularity-purple: #9333ea;
        --singularity-pink: #db2777;
        --singularity-teal: #14b8a6;
        --singularity-gold: #f59e0b;
        --singularity-black: #020617;
        
        --gradient-primary: linear-gradient(90deg, var(--quantum-cyan) 0%, var(--quantum-green) 100%);
        --gradient-secondary: linear-gradient(90deg, var(--quantum-magenta) 0%, var(--quantum-blue) 100%);
        --gradient-income: linear-gradient(90deg, #18D59C 0%, #00E0FF 100%);
        --gradient-singularity: linear-gradient(120deg, var(--singularity-purple) 0%, var(--singularity-pink) 25%, var(--singularity-gold) 50%, var(--singularity-teal) 75%, var(--singularity-purple) 100%);

        --quantum-glow-primary: rgba(0, 224, 255, 0.4);
        --quantum-glow-primary-subtle: rgba(0, 224, 255, 0.2);
        --quantum-glow-secondary: rgba(254, 45, 139, 0.4);
        --quantum-glow-accent: rgba(24, 213, 156, 0.4);
        --color-danger-glow: rgba(249, 65, 68, 0.4);
        --quantum-glow-yellow: rgba(254, 202, 13, 0.4);
        --singularity-glow-purple: rgba(147, 51, 234, 0.4);
        --singularity-glow-teal: rgba(20, 184, 166, 0.4);

        --quantum-surface: var(--color-surface);
        --quantum-border-color: var(--color-border);
      }
       
      /* ... other themes ... */
      [data-theme='singularity-dark'] {
         /* Singularity Theme Definitions */
         --color-primary: #9333ea; --color-secondary: #db2777; --color-accent: #14b8a6; --color-danger: #ef4444; --color-warning: #f59e0b; --color-success: #22c55e;
         --color-bg: #020617; --color-surface: #0f172a; --color-border: rgba(147, 51, 234, 0.3);
         --color-text-heading: #f8fafc; --color-text-body: #cbd5e1; --color-text-subtle: #94a3b8;
         
         --quantum-blue: #1331FF; --quantum-magenta: #FE2D8B; --quantum-green: #18D59C; --quantum-yellow: #FECA0D; --quantum-cyan: #00E0FF;
         --singularity-purple: #9333ea; --singularity-pink: #db2777; --singularity-teal: #14b8a6; --singularity-gold: #f59e0b; --singularity-black: #020617;
         
         --gradient-primary: linear-gradient(90deg, var(--singularity-teal) 0%, var(--singularity-purple) 100%);
         --gradient-secondary: linear-gradient(90deg, var(--singularity-pink) 0%, var(--singularity-gold) 100%);
         --gradient-income: linear-gradient(90deg, #22c55e 0%, #14b8a6 100%);
         --gradient-singularity: linear-gradient(120deg, var(--singularity-purple) 0%, var(--singularity-pink) 25%, var(--singularity-gold) 50%, var(--singularity-teal) 75%, var(--singularity-purple) 100%);
         
         --quantum-glow-primary: rgba(147, 51, 234, 0.4); --quantum-glow-primary-subtle: rgba(147, 51, 234, 0.2); --quantum-glow-secondary: rgba(219, 39, 119, 0.4);
         --quantum-glow-accent: rgba(20, 184, 166, 0.4); --color-danger-glow: rgba(239, 68, 68, 0.4); --quantum-glow-yellow: rgba(245, 158, 11, 0.4);
         --singularity-glow-purple: rgba(147, 51, 234, 0.4); --singularity-glow-teal: rgba(20, 184, 166, 0.4);
         --quantum-surface: var(--color-surface); --quantum-border-color: var(--color-border);
      }

      [data-theme='nova-prime'] {
         /* Nova Prime Theme Definitions */
         --color-primary: #f59e0b; --color-secondary: #14b8a6; --color-accent: #6366f1; --color-danger: #f43f5e; --color-warning: #facc15; --color-success: #4ade80;
         --color-bg: #111827; --color-surface: #1f2937; --color-border: rgba(245, 158, 11, 0.25);
         --color-text-heading: #f9fafb; --color-text-body: #d1d5db; --color-text-subtle: #9ca3af;

         --quantum-blue: #1331FF; --quantum-magenta: #FE2D8B; --quantum-green: #18D59C; --quantum-yellow: #FECA0D; --quantum-cyan: #00E0FF;
         --singularity-purple: #9333ea; --singularity-pink: #db2777; --singularity-teal: #14b8a6; --singularity-gold: #f59e0b; --singularity-black: #020617;

         --gradient-primary: linear-gradient(90deg, var(--color-accent) 0%, var(--color-secondary) 100%);
         --gradient-secondary: linear-gradient(90deg, var(--color-primary) 0%, #fef08a 100%);
         --gradient-income: linear-gradient(90deg, #4ade80 0%, #facc15 100%);
         --gradient-singularity: linear-gradient(120deg, var(--color-primary) 0%, var(--color-accent) 50%, var(--color-secondary) 100%);
         
         --quantum-glow-primary: rgba(245, 158, 11, 0.4); --quantum-glow-primary-subtle: rgba(245, 158, 11, 0.2); --quantum-glow-secondary: rgba(20, 184, 166, 0.4);
         --quantum-glow-accent: rgba(99, 102, 241, 0.4); --color-danger-glow: rgba(244, 63, 94, 0.4); --quantum-glow-yellow: rgba(245, 158, 11, 0.4);
         --singularity-glow-purple: rgba(99, 102, 241, 0.4); --singularity-glow-teal: rgba(20, 184, 166, 0.4);
         --quantum-surface: var(--color-surface); --quantum-border-color: var(--color-border);
      }
      
      /* GLOBAL TYPOGRAPHY & LAYOUT FIXES */
      html, body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color-scheme: dark;
        
        /* Prevents horizontal scrolling */
        overflow-x: hidden;
        width: 100%;
        
        /* Ensures font size scales nicely */
        font-size: 14px; 
        line-height: 1.5;
      }

      @media (min-width: 768px) {
        html, body {
          font-size: 16px; 
        }
      }

      /* Universal text wrapping to prevent overflow */
      * {
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-word; /* Breaks long words if needed */
        box-sizing: border-box;
      }
      
      body {
        font-family: var(--font-family-body);
        color: var(--color-text-body);
        transition: background-color 0.5s ease, color 0.5s ease;
        background-color: var(--color-bg);
        background-image: 
          radial-gradient(circle at 15% 25%, rgba(19, 49, 255, 0.15), transparent 30%),
          radial-gradient(circle at 85% 75%, rgba(254, 45, 139, 0.1), transparent 35%);
        background-attachment: fixed;
      }
      
      h1, h2, h3, h4, h5, h6 { font-family: var(--font-family-heading); line-height: 1.2; }

      /* Utility classes for text overflow */
      .truncate-multiline {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background-color: var(--color-border); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background-color: var(--color-primary); }

      /* Animations */
      @keyframes pulse-slow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
      .animate-pulse-slow { animation: pulse-slow 3s infinite; }
      
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .animate-float { animation: float 6s ease-in-out infinite; }

      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
      .shimmer {
        background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
        background-size: 1000px 100%;
        animation: shimmer 3s infinite linear;
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
